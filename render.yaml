services:
  - type: web
    name: agendafacil-api
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm ci --include=dev && npm run build && npm run prisma:deploy
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: FRONTEND_URL
        sync: false
